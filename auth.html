<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Rede Social - Autenticação</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 50px auto;
      padding: 30px;
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .auth-container h1 {
      text-align: center;
      color: var(--button-bg);
      margin-bottom: 30px;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--text-secondary);
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--input-border);
      border-radius: 5px;
      background: var(--bg-color);
      color: var(--text-color);
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--button-bg);
      box-shadow: 0 0 5px rgba(24, 119, 242, 0.3);
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .auth-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background-color: var(--button-bg);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--button-hover);
    }

    .btn-secondary {
      background-color: var(--input-border);
      color: var(--text-color);
    }

    .btn-secondary:hover {
      background-color: var(--text-secondary);
    }

    .toggle-form {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .toggle-form button {
      background: none;
      border: none;
      color: var(--button-bg);
      cursor: pointer;
      font-weight: 600;
      text-decoration: underline;
    }

    .error {
      color: var(--danger-color);
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .success {
      color: var(--accent-color);
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .users-list {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid var(--input-border);
    }

    .users-list h3 {
      margin-top: 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .user-item {
      padding: 10px;
      margin-bottom: 8px;
      background: var(--bg-color);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .user-item:hover {
      background-color: var(--input-border);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .user-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .user-name {
      font-weight: 600;
    }

    .delete-user {
      background: var(--danger-color);
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .delete-user:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mini Rede Social</h1>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </header>

  <div class="auth-container">
    <h1>🔐 Autenticação</h1>

    <!-- Formulário de Registo -->
    <div class="auth-form active" id="registerForm">
      <h2 style="text-align: center; font-size: 1.2rem; margin-bottom: 20px;">Criar Conta</h2>
      <div class="form-group">
        <label for="registerUsername">Nome de Utilizador</label>
        <input type="text" id="registerUsername" placeholder="Escolhe um nome único" />
        <div class="error" id="registerUsernameError"></div>
      </div>
      <div class="form-group">
        <label for="registerPassword">Palavra-passe</label>
        <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" />
        <div class="error" id="registerPasswordError"></div>
      </div>
      <div class="form-group">
        <label for="registerBio">Biografia (opcional)</label>
        <input type="text" id="registerBio" placeholder="Ex: Programador Full Stack" />
      </div>
      <div class="auth-buttons">
        <button class="btn-primary" onclick="register()">Registar</button>
      </div>
      <div class="toggle-form">
        Já tens conta? <button onclick="switchForm()">Fazer Login</button>
      </div>
    </div>

    <!-- Formulário de Login -->
    <div class="auth-form" id="loginForm">
      <h2 style="text-align: center; font-size: 1.2rem; margin-bottom: 20px;">Fazer Login</h2>
      <div class="form-group">
        <label for="loginUsername">Nome de Utilizador</label>
        <input type="text" id="loginUsername" placeholder="Insere o teu nome de utilizador" />
        <div class="error" id="loginUsernameError"></div>
      </div>
      <div class="form-group">
        <label for="loginPassword">Palavra-passe</label>
        <input type="password" id="loginPassword" placeholder="Insere a tua palavra-passe" />
        <div class="error" id="loginPasswordError"></div>
      </div>
      <div class="auth-buttons">
        <button class="btn-primary" onclick="login()">Login</button>
      </div>
      <div class="toggle-form">
        Não tens conta? <button onclick="switchForm()">Registar-me</button>
      </div>
    </div>

    <!-- Lista de Utilizadores Registados -->
    <div class="users-list" id="usersList" style="display: none;">
      <h3>👥 Utilizadores Registados</h3>
      <div id="usersListContainer"></div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
