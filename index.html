<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Rede Social</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mini Rede Social</h1>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </header>

  <div class="container">
    <div class="search-bar">
      <input id="searchInput" placeholder="Pesquisar publicações..." oninput="filterPosts()" />
    </div>

    <div class="card publish-card">
      <h2>O que estás a pensar?</h2>
      <div class="name-input-container" style="margin-bottom: 10px;">
        <input id="userName" placeholder="O teu nome (opcional)" />
      </div>
      <textarea id="postText" placeholder="Escreve algo..."></textarea>
      <input id="postImage" type="url" placeholder="URL da imagem (opcional)" />
      <button class="primary-btn" onclick="addPost()">Publicar</button>
    </div>

    <div class="section-title">Publicações</div>
    <div id="postList"></div>

    <div class="section-title">Mensagens Rápidas</div>
    <div class="card">
      <div id="msgList"></div>
      <div class="comment-input-container" style="margin-top: 15px;">
        <input id="msgText" placeholder="Escreve uma mensagem..." />
        <button class="primary-btn" style="width: auto;" onclick="addMsg()">Enviar</button>
      </div>
    </div>

    <div class="section-title">Configurações</div>
    <button class="primary-btn danger-btn" onclick="clearAll()">Limpar Todos os Dados</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
