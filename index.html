<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Rede Social</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mini Rede Social</h1>
    <div style="display: flex; align-items: center; gap: 10px;">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button class="theme-toggle" onclick="logout()" title="Fazer Logout">🚪</button>
    </div>
  </header>

  <div class="container">
    <div class="search-bar">
      <input id="searchInput" placeholder="Pesquisar publicações..." oninput="filterPosts()" />
    </div>

    <div class="card profile-card" id="profileCard" style="display: none;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <div id="userAvatarDisplay" class="profile-pic" style="width: 60px; height: 60px; font-size: 1.5rem;"></div>
        <div>
          <h2 id="displayUserName" style="margin: 0;"></h2>
          <p id="displayUserBio" style="margin: 5px 0 0; color: var(--text-secondary); font-size: 0.9rem;"></p>
        </div>
        <button class="action-btn" style="margin-left: auto; width: auto;" onclick="toggleEditProfile()">✏️ Editar</button>
      </div>
    </div>

    <div class="card" id="editProfileCard">
      <h2>O teu Perfil</h2>
      <input id="userName" placeholder="O teu nome" />
      <textarea id="userBio" placeholder="A tua biografia (ex: Programador Full Stack)"></textarea>
      <div style="margin-bottom: 10px;">
        <label style="font-size: 0.8rem; color: var(--text-secondary);">Foto de Perfil:</label>
        <input type="file" id="userAvatarFile" accept="image/*" style="margin-top: 5px;" />
      </div>
      <button class="primary-btn" onclick="saveProfile()">Guardar Perfil</button>
    </div>

    <div class="card publish-card">
      <h2>O que estás a pensar?</h2>
      <textarea id="postText" placeholder="Escreve algo... (usa #hashtags para categorizar)"></textarea>
      <div style="margin-bottom: 10px;">
        <label style="font-size: 0.8rem; color: var(--text-secondary);">Adicionar Imagem:</label>
        <input type="file" id="postImageFile" accept="image/*" style="margin-top: 5px;" />
      </div>
      <button class="primary-btn" onclick="addPost()">Publicar</button>
    </div>

    <div class="section-title">Publicações</div>
    <div id="postList"></div>

    <div class="section-title">Mensagens Rápidas</div>
    <div class="card">
      <div id="msgList"></div>
      <div class="comment-input-container" style="margin-top: 15px;">
        <input id="msgText" placeholder="Escreve uma mensagem..." />
        <button class="primary-btn" style="width: auto;" onclick="addMsg()">Enviar</button>
      </div>
    </div>

    <div class="section-title">Amigos</div>
    <div class="card">
      <h3 style="margin-top: 0;">Procurar Utilizadores</h3>
      <div style="display: flex; gap: 10px;">
        <input id="searchUsersInput" placeholder="Procura por nome de utilizador..." style="flex: 1;" />
        <button class="primary-btn" style="width: auto;" onclick="searchUsers()">Procurar</button>
      </div>
      <div id="searchResults" style="margin-top: 15px;"></div>
    </div>

    <div class="card">
      <h3 style="margin-top: 0;">Pedidos de Amizade 🔔</h3>
      <div id="friendRequests" style="max-height: 250px; overflow-y: auto;"></div>
    </div>

    <div class="card">
      <h3 style="margin-top: 0;">Meus Amigos 👥</h3>
      <div id="friendsList" style="max-height: 300px; overflow-y: auto;"></div>
    </div>

    <div class="section-title">Configurações e Dados</div>
    <div style="display: flex; gap: 10px;">
      <button class="primary-btn" style="background-color: var(--accent-color);" onclick="exportData()">📥 Exportar JSON</button>
      <button class="primary-btn danger-btn" style="margin-top: 0;" onclick="clearAll()">🗑️ Limpar Tudo</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
